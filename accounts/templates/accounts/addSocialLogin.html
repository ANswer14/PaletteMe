{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>추가 정보 입력 - PaletteMe</title>
    <link rel="stylesheet" href="{% static 'accounts/css/addSocialLogin.css' %}">
</head>
<body>
    <div class="mypage add-info-popup"> <div class="card"> <h2>추가 정보 입력</h2>
            <p class="desc">정확한 서비스 이용을 위해 정보를 입력해주세요.</p>

            <form id="addInfoForm">
                <div class="form-group">
                    <label>닉네임</label>
                    <div class="input-group">
                        <input type="text" id="nickname" name="nickname" placeholder="닉네임을 입력하세요">
                        <button type="button" id="nickNameCheckBtn">중복 확인</button>
                    </div>
                    <span id="nickNameStatus" class="status"></span>
                </div>

                <div class="form-group">
                    <label>휴대폰 번호</label>
                    <input type="text" id="phone" name="phone" placeholder="010-0000-0000">
                </div>

                <div class="form-group">
                    <label>성별</label>
                    <div class="gender-selection">
                        <label class="radio-label">
                            <input type="radio" name="gender" value="male"> 남성
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="gender" value="female"> 여성
                        </label>
                    </div>
                </div>

                <button type="button" id="saveInfoBtn" class="signup-submit-btn">
                    정보 저장 및 시작하기</button>
            </form>
        </div>
    </div>

    <script src="{% static 'accounts/js/addSocialLogin.js' %}"></script>
</body>
</html>
