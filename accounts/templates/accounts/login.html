{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 - PaletteMe</title>
    <link rel="stylesheet" href="{% static 'accounts/css/login.css' %}">
</head>
<body>
    <div class="login-container">
        <div id="login-box">
            <h1>Sign In</h1>
            <form method="post" action="{% url 'account_login' %}" id="loginForm">
                <div class="login-inputs">
                    {% csrf_token %}
                    <input type="text" id="userID" name="login" placeholder="아이디"><br>
                    <input type="password" id="passwd" name="password"  placeholder="비밀번호"><br>
                </div>
                <button type='submit' id="loginBtn" class="signup-submit-btn">LOGIN</button>
            </form>
            <p class="login-helper">
                아직 계정이 없으신가요?
                <a href="javascript:void(0);" onclick="goToSignup('{% url 'agreement' %}')">회원가입</a>
            </p>
        </div>
    </div>

    <script src="{% static 'accounts/js/login.js' %}"></script>
    {% if form.errors %}
        <script>
            // 폼에 에러가 있다면 (로그인 실패 시)
            alert("아이디 또는 비밀번호가 일치하지 않습니다.");
        </script>
        {% endif %}
</body>
</html>
