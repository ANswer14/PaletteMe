{% extends "index.html" %}
{% load static %}

{% block title %} 로그인 - PaletteMe {% endblock %}

{% block content %}
    <link rel="stylesheet" href="{% static 'accounts/css/login.css' %}">

    <div class="login-container">
        <div id="login-box">
            <h1>Sign In</h1>
            <form method="post" action="{% url 'account_login' %}">
                <div class="login-inputs">
                    {% csrf_token %}
                    <input type="text" id="userID" placeholder="아이디"><br>
                    <input type="password" id="passwd" placeholder="비밀번호"><br>
                </div>
                <button type='submit' id="loginBtn" class="signup-submit-btn">LOGIN</button>
            </form>
        </div>
        <p class="login-helper">
            아직 계정이 없으신가요? <a href="{% url 'agreement' %}">회원가입</a>
        </p>
    </div>

    <script src="{% static 'accounts/js/login.js' %}"></script>

{% endblock %}
