{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>MyPage</title>
    <link rel="stylesheet" href="{% static 'accounts/css/mypage.css' %}">
</head>
<body>
<header class="header">
    <div class="header-left"></div>
    <div class="logo">
        <a href="{% url 'core:index' %}">
            <img src="{% static 'accounts/images/logo.png' %}" alt="로고" class="header-logo-img">
        </a>
    </div>
    <div class="auth">
        <img id="headerProfileImg" src="{% if user.profile_image %}{{ user.profile_image.url }}{% else %}{% static 'accounts/images/main1.png' %}{% endif %}" class="profile-circle small">
        <a href="#">회원정보</a>
        <a href="{% url 'account_logout' %}">로그아웃</a>
    </div>
</header>

<div class="mypage">
    <h2>마이페이지</h2>

  <section class="card">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group">
                <label>아이디</label>
                <input type="text" id="userId" value="{{ user.username }}" readonly>
            </div>

            <div class="form-group">
                <label>닉네임</label>
                <div class="input-group">
                    <input type="text" id="userName" name="nickname" value="{{ form.nickname.value|default:user.nickname }}">
                    <button type="button" id="nickNameCheckBtn">중복 확인</button>
                </div>
                <span id="nickNameStatus" class="status"></span>
            </div>

            <div class="form-group">
                <label>이메일</label>
                <div class="input-group">
                    <input type="email" id="email" name="email" value="{{ form.email.value|default:user.email }}">
                    <button type="button" id="emailDuplicateBtn">중복 확인</button>
                </div>
                <span id="emailStatus" class="status"></span>
            </div>

            <div class="form-group">
                <label>휴대폰 번호</label>
                <input type="text" id="phone" name="phone_number" value="{{ form.phone_number.value|default:user.phone_number }}">
            </div>

            <div class="form-group profile-section">
                <label>프로필 사진</label>
                <div class="profile-main">
                    <img id="profilePreview" src="{% if user.profile_image %}{{ user.profile_image.url }}{% else %}{% static 'accounts/images/main1.png' %}{% endif %}" alt="프로필" class="profile-circle large">
                    <button type="button" class="custom-file-btn" onclick="document.getElementById('profileUpload').click()">
                        내 PC에서 사진 선택
                    </button>
                </div>
                <input type="file" id="profileUpload" name="profile_image" accept="image/*" onchange="previewFile()" style="display:none;">

                <div class="default-images">
                    <p>기본 이미지 선택</p>
                    <div class="img-list">
                        <img src="{% static 'accounts/images/logo4.png' %}" class="selectable-img" onclick="selectImage('logo4.png')">
                        <img src="{% static 'accounts/images/logo2.png' %}" class="selectable-img" onclick="selectImage('logo2.png')">
                        <img src="{% static 'accounts/images/logo3.png' %}" class="selectable-img" onclick="selectImage('logo3.png')">
                    </div>
                </div>
            </div>
            <button type="submit" id="saveInfoBtn">정보 수정 저장</button>
        </form>
    </section>

    <section class="card">
        <h3>보안 및 인증</h3>

        <form method="post" action="{% url 'account_change_password' %}">
            {% csrf_token %}
            <input type="password" id="currentPw" name="old_password" placeholder="현재 비밀번호">
            <input type="password" id="newPw" name="password1" placeholder="새 비밀번호">
            <input type="password" id="newPwCheck" name="password2" placeholder="새 비밀번호 확인">
            <button type="submit" id="changePwBtn">비밀번호 변경</button>
        </form>
    </section>

    <section class="card">
        <h3>나의 활동</h3>
        <div class="link-buttons">
            <button onclick="location.href='#'">내 게시글 보기</button>
            <button onclick="location.href='#'">내 댓글 보기</button>
        </div>
    </section>

    <section class="card">
        <h3>최근 생성 이미지</h3>
        <div id="recentImages" class="image-box"></div>
    </section>

    <section class="card">
        <h3>진단 히스토리</h3>
        <table id="diagnosisTable"></table>
    </section>

    <section class="card">
        <h3>즐겨찾기</h3>
        <div id="favoriteImages" class="image-box"></div>
    </section>

    <section class="card withdraw-section">
        <h3>계정 탈퇴</h3>
        <form method="post" action="#">
            {% csrf_token %}
            <button type="submit" id="withdrawBtn" onclick="return confirm('정말 탈퇴하시겠습니까?')">회원 탈퇴</button>
        </form>
    </section>
</div>

<footer class="footer">
    <a href="#">Instagram</a>
    <a href="#">Twitter</a>
    <a href="#">Contact</a>
</footer>

<script src="{% static 'accounts/js/mypage.js' %}"></script>
</body>
</html>
