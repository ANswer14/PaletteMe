<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>글쓰기</title>
    <link rel="stylesheet" href="mypage.css">
</head>
<body>
<!-- ===== HEADER ===== -->
<header class="header">
    <div class="header-left"></div>
    <div class="logo">
        <a href="index.html">
            <img src="logo.png" alt="로고" class="header-logo-img">
        </a>
    </div>
    <div class="auth">
        <img id="headerProfileImg" src="main1.png" class="profile-circle small">
        <a href="#">회원정보</a>
        <a href="../login/login.html">로그아웃</a>
    </div>
</header>

<div class="mypage">
    <h2>마이페이지</h2>

  <!-- 기본정보 -->
    <section class="card">
        <div class="form-group">
            <label>아이디</label>
            <input type="text" id="userId" readonly>
        </div>

        <div class="form-group">
            <label>닉네임</label>
            <div class="input-group">
                <input type="text" id="userName">
                <button type="button" id="nickNameCheckBtn">중복 확인</button>
            </div>
            <span id="nickNameStatus" class="status"></span>
        </div>

        <div class="form-group">
            <label>이메일</label>
            <div class="input-group">
                <input type="email" id="email">
                <button type="button" id="emailDuplicateBtn">중복 확인</button>
            </div>
            <span id="emailStatus" class="status"></span>
        </div>

        <div class="form-group">
            <label>휴대폰 번호</label>
            <input type="text" id="phone">
        </div>

        <div class="form-group profile-section">
            <label>프로필 사진</label>
            <div class="profile-main">
                <img id="profilePreview" src="main1.png" alt="프로필" class="profile-circle large">
                <button type="button" class="custom-file-btn" onclick="document.getElementById('profileUpload').click()">
                    내 PC에서 사진 선택
                </button>
            </div>
            <input type="file" id="profileUpload" accept="image/*" onchange="previewFile()">

            <div class="default-images">
                <p>기본 이미지 선택</p>
                <div class="img-list">
                    <img src="logo4.png" class="selectable-img" onclick="selectImage('logo4.png')">
                    <img src="logo2.png" class="selectable-img" onclick="selectImage('logo2.png')">
                    <img src="logo3.png" class="selectable-img" onclick="selectImage('logo3.png')">
                </div>
            </div>
        </div>
        <button id="saveInfoBtn">정보 수정 저장</button>
    </section>

    <!-- 보안 -->
    <section class="card">
        <h3>보안 및 인증</h3>

        <input type="password" id="currentPw" placeholder="현재 비밀번호">
        <input type="password" id="newPw" placeholder="새 비밀번호">
        <input type="password" id="newPwCheck" placeholder="새 비밀번호 확인">
        <button id="changePwBtn">비밀번호 변경</button>

    </section>

    <!-- 부가 정보 -->
    <section class="card">
        <h3>나의 활동</h3>
        <div class="link-buttons">
            <button onclick="location.href='/my-posts'">내 게시글 보기</button>
            <button onclick="location.href='/my-comments'">내 댓글 보기</button>
        </div>
    </section>

    <!-- 핵심 기록 -->
    <section class="card">
        <h3>최근 생성 이미지</h3>
        <div id="recentImages" class="image-box"></div>
    </section>

    <section class="card">
        <h3>진단 히스토리</h3>
        <table id="diagnosisTable"></table>
    </section>

    <section class="card">
        <h3>즐겨찾기</h3>
        <div id="favoriteImages" class="image-box"></div>
    </section>

    <!-- 탈퇴 -->
    <section class="card withdraw-section">
        <h3>계정 탈퇴</h3>
        <button id="withdrawBtn">회원 탈퇴</button>
    </section>
</div>

<!-- ===== FOOTER ===== -->
<footer class="footer">
    <a href="#">Instagram</a>
    <a href="#">Twitter</a>
    <a href="#">Contact</a>
</footer>

<script src="mypage.js"></script>
</body>
</html>
