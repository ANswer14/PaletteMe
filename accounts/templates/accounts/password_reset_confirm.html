{% extends "index.html" %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'accounts/css/auth_pages.css' %}">

<div class="auth-container reset-confirm">
    <h2>비밀번호 변경 - PaletteMe</h2>

    <form method="post" class="auth-form">
        {% csrf_token %}
        
        <div class="input-group">
            <label for="id_new_password">새 비밀번호:</label>
            <input type="password" name="new_password" id="id_new_password" required>
        </div>

        <ul class="password-guidelines">
            <li>다른 개인 정보와 유사한 비밀번호는 사용할 수 없습니다.</li>
            <li>비밀번호는 최소 8자 이상이어야 합니다.</li>
            <li>통상적으로 자주 사용되는 비밀번호는 사용할 수 없습니다.</li>
            <li>숫자로만 이루어진 비밀번호는 사용할 수 없습니다.</li>
        </ul>

        <div class="input-group">
            <label for="id_new_password_confirm">새 비밀번호 (확인):</label>
            <input type="password" name="new_password_confirm" id="id_new_password_confirm" required>
        </div>

        <div class="btn-group">
            <button type="submit" class="auth-submit-btn">비밀번호 변경</button>
            <button type="button" class="auth-cancel-btn" onclick="history.back();">취소</button>
        </div>
    </form>
</div>
{% endblock %}
