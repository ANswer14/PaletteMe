{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link rel="stylesheet" href="{% static 'accounts/css/signup.css' %}">
</head>
<body>
    <header class="header">
        <div class="header-left">
        <!-- 필요 시 왼쪽 버튼/메뉴 -->
        </div>
        <div class="logo">
            <a href="#">Title</a>
        </div>
        <div class="auth">
            <a href="#">로그인</a>
            <a href="#">회원가입</a>
        </div>
    </header>

    <div id="signup">
        <h1>회원가입</h1>
        <form id="signupForm">
            <label for="userID">아이디:</label>
            <input type="text" id="userID" name="userID" placeholder="아이디 입력">
            <button type="button" id="checkIDBtn">중복확인</button><br><br>

            <label for="passwd">비밀번호:</label>
            <input type="password" id="passwd" name="passwd" placeholder="비밀번호 입력"><br><br>

            <label for="passwdConfirm">비밀번호 확인:</label>
            <input type="password" id="passwdConfirm" name="passwdConfirm" placeholder="비밀번호 확인"><br><br>

            <label for="name">이름:</label>
            <input type="text" id="name" name="name" placeholder="이름 입력"><br><br>

            <label for="phone">연락처:</label>
            <input type="text" id="phone" name="phone" placeholder="연락처 입력"><br><br>

            <label for="email">이메일:</label>
            <input type="email" id="email" name="email" placeholder="이메일 입력"><br><br>

            <label>성별:</label>
            <div class="gender-options">
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">남</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">여</label><br><br>
            </div>

            <button type="submit">회원가입</button>
        </form>
    </div>
<!-- ===== FOOTER ===== -->
<footer class="footer">
    <a href="#">Instagram</a>
    <a href="#">Twitter</a>
    <a href="#">Contact</a>
</footer>

<script src="{% static 'accounts/js/signup.js' %}"></script>
</body>
</html>
