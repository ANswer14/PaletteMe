{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>QnA</title>
    <link rel="stylesheet" href="{% static 'boards/css/QnA1.css' %}">
</head>
<body>

<header class="header">
    <div class="header-left"></div>
    <div class="logo">
        <a href="{% url 'boards:board_main' %}">Title</a>
    </div>
    <div class="auth">
        <a href="#">회원정보</a>
        <a href="#">로그아웃</a>
    </div>
</header>

<div class="board-container QnA">
    <h2>QnA</h2>

    <div class="board-header">
        <div class="col-no">번호</div>
        <div class="col-title">제목</div>
        <div class="col-writer">작성자</div>
        <div class="col-date">날짜</div>
        <div class="col-view">조회수</div>
    </div>

    <!-- ✅ 정적 목록 (DB 사용 X) -->
    <div class="board-list">
        <div class="board-row" onclick="goQnADetail(3)">
            <div class="col-no">3</div>
            <div class="col-title">이런거 질문해도 되나요?</div>
            <div class="col-writer">민수</div>
            <div class="col-date">2026-02-02</div>
            <div class="col-view">33</div>
        </div>

        <div class="board-row" onclick="goQnADetail(2)">
            <div class="col-no">2</div>
            <div class="col-title">질문있어요 <span class="comment-count">[1]</span></div>
            <div class="col-writer">홍길동</div>
            <div class="col-date">2026-02-02</div>
            <div class="col-view">8</div>
        </div>

        <div class="board-row" onclick="goQnADetail(1)">
            <div class="col-no">1</div>
            <div class="col-title">첫 번째 질문입니다 <span class="comment-count">[1]</span></div>
            <div class="col-writer">익명</div>
            <div class="col-date">2026-02-02</div>
            <div class="col-view">12</div>
        </div>
    </div>

    <!-- ✅ 글쓰기 버튼 (정적 버전: qna_write로 이동) -->
    <div class="board-footer">
        <button class="write-btn" onclick="location.href='{% url "boards:qna_write" %}'">
            글쓰기
        </button>
    </div>

    <div class="pagination">
        <span>1</span>
        <span>2</span>
        <span>3</span>
    </div>
</div>

<footer class="footer">
    <a href="#">Instagram</a>
    <a href="#">Twitter</a>
    <a href="#">Contact</a>
</footer>

<!-- ✅ 정적 상세 이동용 JS (없으면 추가해야 함) -->
<script src="{% static 'boards/js/QnA1.js' %}" defer></script>

</body>
</html>
