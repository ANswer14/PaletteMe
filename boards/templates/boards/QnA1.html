{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>QnA 글쓰기</title>
    <link rel="stylesheet" href="{% static 'boards/css/QnAWrite.css' %}">
</head>
<body>

<header class="header">
    <div class="header-left"></div>
    <div class="logo">
        <a href="{% url 'boards:board_main' %}">Title</a>
    </div>
    <div class="auth">
        <a href="#">회원정보</a>
        <a href="#">로그아웃</a>
    </div>
</header>

<div class="board-write-container QnA">
    <h2>QnA 글쓰기</h2>

    <div class="write-form">
        <!-- 옵션들 -->
        <div class="options-row">
            <label class="checkbox">
                <input type="checkbox" id="isPrivate">
                <span>비밀글</span>
            </label>
            <label class="checkbox">
                <input type="checkbox" id="isAnonymous">
                <span>익명</span>
            </label>

            <div class="category-wrap">
                <label for="category" class="sr-only">카테고리</label>
                <select id="category">
                    <option value="question" selected>질문</option>
                    <option value="bug">버그</option>
                    <option value="feature">기능요청</option>
                    <option value="etc">기타</option>
                </select>
            </div>
        </div>

        <!-- 제목 -->
        <div class="field">
            <label for="postTitle">제목</label>
            <input type="text" id="postTitle" placeholder="글 제목을 입력하세요" maxlength="50">
            <div class="meta-row">
                <span class="hint">2~50자</span>
                <span class="counter"><span id="titleCount">0</span>/50</span>
            </div>
            <p class="error" id="titleError"></p>
        </div>

        <!-- 작성자 -->
        <div class="field">
            <label for="postWriter">작성자</label>
            <input type="text" id="postWriter" value="김주연" readonly>
            <div class="meta-row">
                <span class="hint" id="writerHint">익명 체크 시 작성자가 숨겨집니다</span>
            </div>
        </div>

        <!-- 내용 + 탭 -->
        <div class="field">
            <div class="content-head">
                <label for="postContent">내용</label>

                <div class="tabs">
                    <button type="button" class="tab active" data-tab="write">작성</button>
                    <button type="button" class="tab" data-tab="preview">미리보기</button>
                </div>
            </div>

            <!-- 툴바 -->
            <div class="toolbar" role="toolbar" aria-label="에디터 툴바">
                <button type="button" class="tool" data-tool="bold"><b>B</b></button>
                <button type="button" class="tool" data-tool="italic"><i>I</i></button>
                <button type="button" class="tool" data-tool="code">{"</button>
                <button type="button" class="tool" data-tool="link">🔗</button>

                <span class="toolbar-sep"></span>

                <button type="button" class="tool" data-tool="ul">• 리스트</button>
                <button type="button" class="tool" data-tool="ol">1. 리스트</button>

                <span class="toolbar-sep"></span>

                <!-- ✅ 글씨 색/크기 -->
                <label class="tool-inline">
                    글씨색
                    <input type="color" id="textColor" value="#111111" title="글씨 색">
                </label>

                <label class="tool-inline">
                    글씨크기
                    <select id="textSize" title="글씨 크기">
                        <option value="">기본</option>
                        <option value="12">12px</option>
                        <option value="14">14px</option>
                        <option value="16">16px</option>
                        <option value="18">18px</option>
                        <option value="20">20px</option>
                        <option value="24">24px</option>
                        <option value="28">28px</option>
                        <option value="32">32px</option>
                    </select>
                </label>

                <button type="button" class="tool" data-tool="apply-style">적용</button>
                <button type="button" class="tool" data-tool="clear-style">서식제거</button>
            </div>

            <textarea id="postContent" rows="10" placeholder="내용을 입력하세요" maxlength="2000"></textarea>

            <div id="previewPane" class="preview-pane" hidden></div>

            <div class="meta-row">
                <span class="hint">10~2000자 · 마크다운 일부 지원 · 색/크기 지원</span>
                <span class="counter"><span id="contentCount">0</span>/2000</span>
            </div>
            <p class="error" id="contentError"></p>
        </div>

        <!-- 첨부 -->
        <div class="field">
            <label for="attachments">첨부파일</label>
            <input type="file" id="attachments" multiple>
            <div class="meta-row">
                <span class="hint">이미지는 미리보기 가능 · (실제 업로드는 서버 연동 시)</span>
                <button type="button" class="ghost" id="clearAttachmentsBtn">첨부 전체 삭제</button>
            </div>
            <div id="attachmentList" class="attachment-list"></div>
        </div>

        <!-- 임시저장 -->
        <div class="draft-row">
            <div class="draft-left">
                <span class="draft-status" id="draftStatus">임시저장 준비됨</span>
            </div>
            <div class="draft-right">
                <button type="button" class="ghost" id="loadDraftBtn">임시저장 불러오기</button>
                <button type="button" class="ghost" id="clearDraftBtn">임시저장 삭제</button>
            </div>
        </div>

        <div class="button-group">
            <button id="submitBtn" type="button" onclick="submitPost()">등록</button>
            <button type="button" onclick="history.back()">취소</button>
        </div>

        <div id="submitOverlay" class="submit-overlay" hidden>
            <div class="spinner"></div>
            <p>등록 처리중…</p>
        </div>
    </div>
</div>

<footer class="footer">
    <a href="#">Instagram</a>
    <a href="#">Twitter</a>
    <a href="#">Contact</a>
</footer>

<script src="{% static 'boards/js/QnAWrite.js' %}" defer></script>
</body>
</html>
