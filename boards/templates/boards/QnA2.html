{% extends "index.html" %}
{% load static %}

{% block title %} QnA - PaletteMe {% endblock %}

{% block content %}
    <link rel="stylesheet" href="{% static 'boards/css/QnA2.css' %}">
    <input type="hidden" id="userName" value="{{ user.nickname }}">
    {% csrf_token %}
    <div class="board-detail-container QnA">
        <h2>QnA</h2>

        <!-- 제목줄: 헤더 -->
        <div class="title-header">
            <span class="col-header">No.</span>
            <span class="col-header">제 목</span>
            <span class="col-header">작성일</span>
            <span class="col-header">조회수</span>
        </div>

        <!-- 데이터줄: 실제 게시글 -->
        <div class="title-row">
            <span id="detailNo"></span>
            <span id="detailTitle"></span>
            <span id="detailDate"></span>
            <span id="detailView"></span>
        </div>
        <hr class="section-divider">

        <div class="detail-content" id="detailContent">
            내용 자리
        </div>
        <hr class="section-divider">

        <div id="fix-btn">
        </div>

        <!-- 운영자 답글 영역 -->
        <div class="comment-section">
            <h3>답변</h3>
            <div id="commentList"></div>
<!--            {% if user.is_staff == True %}-->
<!--                <button id="comment-btn">댓글 추가</button>-->
<!--            {% endif %}-->
        </div>

        <div class="detail-nav">
            <span id="prevBtn" onclick="goPrev()">이전글</span> |
            <span onclick="goList()">글목록</span> |
            <span id="nextBtn" onclick="goNext()">다음글</span>
        </div>

    </div>

    <script src="{% static 'boards/js/QnA2.js' %}" defer></script>
{% endblock %}
