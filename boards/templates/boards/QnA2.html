{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>글 상세보기</title>
    <link rel="stylesheet" href="{% static 'boards/css/QnA2.css' %}">
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="header">
    <div class="header-left"></div>

    <div class="logo">
        <a href="{% url 'boards:board_main' %}">Title</a>
    </div>

    <div class="auth">
        <a href="#">회원정보</a>
        <a href="#">로그아웃</a>
    </div>
</header>

<div class="board-detail-container QnA">

    <!-- 제목 헤더 -->
    <div class="title-header">
        <span>No.</span>
        <span>제목</span>
        <span>작성자</span>
        <span>작성일</span>
        <span>조회수</span>
    </div>

    <!-- 제목 데이터 -->
    <div class="title-row">
        <span id="detailNo"></span>
        <strong id="detailTitle"></strong>
        <span id="detailWriter"></span>
        <time id="detailDate"></time>
        <span id="detailView"></span>
    </div>

    <hr class="section-divider">

    <!-- 내용 -->
    <div class="detail-content" id="detailContent"></div>

    <hr class="section-divider">

    <!-- 댓글 -->
    <div class="comment-section">
        <h3>댓글</h3>
        <div id="commentList"></div>

        <div class="comment-input">
            <textarea id="commentText" placeholder="댓글을 입력하세요"></textarea>
            <button id="commentBtn">등록</button>
        </div>
    </div>

    <!-- 하단 버튼 -->
    <div class="nav-buttons">
        <button onclick="goList()">글목록</button>
    </div>
</div>

<!-- JS -->
<script src="{% static 'boards/js/QnA2.js' %}" defer></script>

<!-- ===== FOOTER ===== -->
<footer class="footer">
    <a href="#">Instagram</a>
    <a href="#">Twitter</a>
    <a href="#">Contact</a>
</footer>

</body>
</html>
