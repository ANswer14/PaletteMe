<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>글 상세보기</title>
    <link rel="stylesheet" href="QnA2.css">
</head>
<body>
<!-- ===== HEADER ===== -->
    <header class="header">
        <div class="header-left">
            <!-- 필요 시 왼쪽 버튼/메뉴 -->
        </div>
        <div class="logo">
            <a href="index.html">Title</a>
        </div>

        <div class="auth">
            <a href="#">회원정보</a>
            <a href="../login/login.html">로그아웃</a>
        </div>
    </header>
    <div class="board-detail-container QnA">
        <h2>QnA</h2>
        <!-- 제목줄: 헤더 -->
        <div class="title-header">
            <span class="col-header">No.</span>
            <span class="col-header">제목</span>
            <span class="col-header">작성자</span>
            <span class="col-header">작성일</span>
            <span class="col-header">조회수</span>
        </div>

        <!-- 데이터줄: 실제 게시글 -->
        <div class="title-row">
            <span id="detailNo"></span>
            <span id="detailTitle"></span>
            <span id="detailWriter"></span>
            <span id="detailDate"></span>
            <span id="detailView"></span>
        </div>
        <hr class="section-divider">

        <div class="detail-content" id="detailContent">
            내용 자리
        </div>
        <hr class="section-divider">

        <!-- 댓글 영역 -->
        <div class="comment-section">
            <h3>댓글</h3>
            <div id="commentList"></div>
            <div class="comment-input">
                <input type="text" id="commentText" placeholder="댓글을 입력하세요">
                <button onclick="addComment()">등록</button>
            </div>
        </div>

        <div class="nav-buttons">
            <span id="prevBtn" onclick="goPrev()">이전글</span> |
            <span onclick="goList()">글목록</span> |
            <span id="nextBtn" onclick="goNext()">다음글</span>
        </div>

    </div>
<!-- ===== FOOTER ===== -->
<footer class="footer">
    <a href="#">Instagram</a>
    <a href="#">Twitter</a>
    <a href="#">Contact</a>
</footer>

<script src="QnA2.js" defer></script>
</body>
</html>
