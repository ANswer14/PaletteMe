<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>글쓰기</title>
    <link rel="stylesheet" href="QnAWrite.css">
</head>
<body>
<!-- ===== HEADER ===== -->
<header class="header">
    <div class="header-left"></div>
    <div class="logo">
        <a href="index.html">Title</a>
    </div>
    <div class="auth">
        <a href="#">회원정보</a>
        <a href="../login/login.html">로그아웃</a>
    </div>
</header>

<div class="board-write-container QnA">
    <h2>자유게시판 글쓰기</h2>

    <div class="write-form">
        <label for="postTitle">제목</label>
        <input type="text" id="postTitle" placeholder="글 제목을 입력하세요">

        <label for="postWriter">작성자</label>
        <input type="text" id="postWriter" value="김주연" readonly>

        <label for="postContent">내용</label>
        <textarea id="postContent" rows="10" placeholder="내용을 입력하세요"></textarea>

        <div class="button-group">
            <button onclick="submitPost()">등록</button>
            <button onclick="cancelPost()">취소</button>
        </div>
    </div>
</div>

<!-- ===== FOOTER ===== -->
<footer class="footer">
    <a href="#">Instagram</a>
    <a href="#">Twitter</a>
    <a href="#">Contact</a>
</footer>

<script src="QnAWrite.js" defer></script>
</body>
</html>
