{% extends "index.html" %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'boards/css/boardWrite.css' %}">

<style>
    /* 에디터(textarea) 스타일 마감 */
    #editor-outer { 
        border: 1px solid #ddd; 
        border-radius: 8px; 
        background: #fff; 
        margin-bottom: 20px; 
        overflow: hidden;
    }
    #postBody { 
        width: 100%; 
        height: 450px; 
        padding: 20px; 
        border: none; 
        outline: none; 
        resize: none; 
        font-size: 16px; 
        line-height: 1.6;
    }
    #editor-outer:focus-within {
        border-color: #f39898;
        box-shadow: 0 0 0 2px rgba(243, 152, 152, 0.1);
    }
    .option-box { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 15px; display: none; }
    .image-preview-container { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .preview-item { position: relative; width: 100px; height: 100px; border-radius: 5px; overflow: hidden; border: 1px solid #ddd; }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .btn-remove { position: absolute; top: 0; right: 0; background: rgba(0,0,0,0.5); color: #fff; border: none; cursor: pointer; padding: 2px 5px; }
</style>

<div class="board-write-wrapper">
    <div class="board-write-container">
        <header class="write-header">
            <h2>{% if is_edit %}게시글 수정{% else %}새 게시글 작성{% endif %}</h2>
        </header>

        <section class="write-section">
            <div class="input-row" style="display: flex; gap: 15px; margin-bottom: 20px;">
                <div class="input-group" style="flex: 1;">
                    <label>게시판</label>
                    <select id="boardCategory" onchange="toggleOptions()" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                        <option value="free" {% if data.category == 'FREE' %}selected{% endif %}>자유게시판</option>
                        <option value="qna" {% if data.category == 'QNA' %}selected{% endif %}>Q&A 게시판</option>
                    </select>
                </div>
                <div class="input-group" style="flex: 3;">
                    <label>제목</label>
                    <input type="text" id="postTitle" placeholder="제목을 입력하세요" value="{{ data.title|default:'' }}" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
            </div>

            <div class="input-group">
                <label>내용</label>
                <div id="editor-outer">
                    <textarea id="postBody" placeholder="여기에 내용을 입력하세요...">{{ data.body|default:'' }}</textarea>
                </div>
            </div>

            <div class="input-group" style="margin-bottom: 20px;">
                <label>이미지 첨부 (최대 5장)</label>
                <input type="file" id="imageInput" multiple accept="image/*" style="display: none;" onchange="handleImageUpload(this)">
                <button type="button" onclick="document.getElementById('imageInput').click()" style="padding: 8px 15px; background: #eee; border: 1px solid #ccc; border-radius: 4px; cursor: pointer;">파일 선택</button>
                <div id="imagePreview" class="image-preview-container"></div>
            </div>

            <div id="freeOptions" class="option-box">
                <label><input type="checkbox" id="is_anonymous"> 익명으로 작성하기</label>
            </div>
            <div id="qnaOptions" class="option-box">
                <label><input type="checkbox" id="is_private"> 비공개 질문하기</label>
            </div>

            <footer class="write-footer" style="text-align: center; margin-top: 30px;">
                <button class="btn-cancel" type="button" onclick="history.back()" style="padding: 10px 25px; margin-right: 10px;">취소</button>
                <button class="btn-submit" type="button" onclick="submitPost()" style="background:#f39898; color:#fff; border:none; padding:10px 40px; border-radius:6px; cursor:pointer; font-weight:bold;">
                    {% if is_edit %}수정완료{% else %}등록하기{% endif %}
                </button>
            </footer>
        </section>
    </div>
</div>

<input type="hidden" id="post_id" value="{{ data.post_id|default:'' }}">
<script src="{% static 'boards/js/boardWrite.js' %}"></script>
{% endblock %}
