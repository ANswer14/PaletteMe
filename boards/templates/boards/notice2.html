{% extends "index.html" %}
{% load static %}

{% block title %} Notice - PaletteMe {% endblock %}

{% block content %}
    <link rel="stylesheet" href="{% static 'boards/css/notice2.css' %}">

    <div class="board-detail-container notice">
        <!-- 제목줄: 헤더 -->
        <div class="title-header">
            <span class="col-header">No</span>
            <span class="col-header">제목</span>
            <span class="col-header">작성일</span>
        </div>

        <!-- 데이터줄: 실제 게시글 -->
        <div class="title-row">
            <span>{{ notice.id }}</span>
            <span title="{{ notice.title }}">{{ notice.title }}</span>
            <span>{{ notice.created_at|date:"Y-m-d" }}</span>
        </div>
        <hr class="section-divider">

  <div class="detail-content">
    {{ notice.body_html|safe }}
  </div>

        <div class="detail-nav">
            <span onclick="location.href='{% url 'boards:notice_list' %}'">글목록</span>
        </div>
    </div>

<script src="{% static 'boards/js/notice2.js' %}"></script>
{% endblock %}
